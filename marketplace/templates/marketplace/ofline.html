{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline — OJA Campus</title>
  <link rel="stylesheet" href="{% static 'css/oja.css' %}">
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0f172a; }
    .offline-box { text-align:center; padding:3rem 2rem; max-width:420px; }
    .offline-icon { font-size:5rem; margin-bottom:1.5rem; animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .offline-title { font-size:1.75rem; font-weight:900; color:#fff; margin-bottom:.75rem; }
    .offline-sub { color:rgba(255,255,255,.5); font-size:.95rem; line-height:1.6; margin-bottom:2rem; }
    .offline-btn { background:#D4AF37; color:#fff; border:none; padding:.875rem 2rem; border-radius:10px; font-weight:700; font-size:1rem; cursor:pointer; font-family:inherit; }
    .offline-btn:hover { background:#C69C2E; }
    .offline-tips { margin-top:2rem; text-align:left; background:rgba(255,255,255,.05); border-radius:10px; padding:1.25rem; }
    .offline-tips h4 { color:rgba(255,255,255,.7); font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; margin-bottom:.75rem; }
    .offline-tips li { color:rgba(255,255,255,.45); font-size:.85rem; margin-bottom:.4rem; list-style:none; padding-left:0; }
    .offline-tips li::before { content:'✓ '; color:#D4AF37; }
  </style>
</head>
<body>
  <div class="offline-box">
    <div class="offline-icon">📡</div>
    <div class="offline-title">You're Offline</div>
    <p class="offline-sub">No internet connection detected. Some OJA features require a connection to work.</p>
    <button class="offline-btn" onclick="window.location.reload()">Try Again</button>
    <div class="offline-tips">
      <h4>While you're offline you can still:</h4>
      <ul>
        <li>View recently browsed pages</li>
        <li>See cached product listings</li>
        <li>Read saved order details</li>
      </ul>
    </div>
  </div>
  <script>
    window.addEventListener('online', function(){ window.location.reload(); });
  </script>
</body>
</html>
